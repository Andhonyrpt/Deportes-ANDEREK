name: CI – Ecommerce API

# Trigger on every push and pull request to the main branch.
# This pipeline acts as the quality gate for production readiness.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20.x'

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Job 1: Lint
  # Fast-fail check: validates code style before running any tests.
  # ────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0

  # ────────────────────────────────────────────────────────────────────
  # Job 2: Unit Tests
  # Runs in isolation — no real DB needed, all dependencies are mocked.
  # ────────────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npx vitest run tests/unit
        env:
          NODE_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret_placeholder' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci_test_refresh_secret_placeholder' }}

  # ────────────────────────────────────────────────────────────────────
  # Job 3: Integration Tests
  # Spins up a real MongoDB instance as a Docker service for full
  # end-to-end testing of routes → middlewares → controllers → DB.
  # ────────────────────────────────────────────────────────────────────
  integration-tests:
    name: 🔗 Integration Tests (Vitest + MongoDB)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Integration Tests
        run: npx vitest run tests/integration
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: ecommerce_test_ci
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret_placeholder' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci_test_refresh_secret_placeholder' }}
          RATE_LIMIT_WINDOW_MS: '60000'
          RATE_LIMIT_MAX: '1000'
          PORT: '3001'

  # ────────────────────────────────────────────────────────────────────
  # Job 4: Coverage Report
  # Generates an LCOV coverage report and enforces 80% threshold.
  # Only runs on pushes to main/develop (not on PRs) to save CI minutes.
  # ────────────────────────────────────────────────────────────────────
  coverage:
    name: 📊 Coverage Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: github.event_name == 'push'

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Coverage Report
        run: npx vitest run --coverage
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB: ecommerce_test_ci
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci_test_jwt_secret_placeholder' }}
          REFRESH_TOKEN_SECRET: ${{ secrets.REFRESH_TOKEN_SECRET || 'ci_test_refresh_secret_placeholder' }}
          RATE_LIMIT_WINDOW_MS: '60000'
          RATE_LIMIT_MAX: '1000'
          PORT: '3001'

      - name: Upload LCOV report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 30
